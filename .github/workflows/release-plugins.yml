name: Release Plugins

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for gh release create/upload

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and pack all plugins
        run: |
          mkdir -p release-assets
          for plugin in plugins/*/; do
            name=$(basename "$plugin")
            echo "Building $name..."
            # tsc exits non-zero when SDK types are missing (link: dep outside repo),
            # but --noEmitOnError false still writes the dist JS. Warn and continue.
            (cd "$plugin" && pnpm build) \
              || echo "::warning::$name build had type errors (SDK peer dep not on npm — expected in CI)"
            if [ ! -d "$plugin/dist" ]; then
              echo "::error::$name dist/ missing after build — aborting"
              exit 1
            fi
            # npm pack outputs <name>-<version>.tgz to the specified destination
            npm pack "$plugin" --pack-destination release-assets/
          done

      - name: List packed tarballs
        run: ls -lh release-assets/

      - name: Create GitHub Release and upload tarballs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: release-assets/*.tgz
          generate_release_notes: true
