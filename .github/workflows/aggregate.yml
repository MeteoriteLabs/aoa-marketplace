name: Aggregate Catalog

on:
  schedule:
    - cron: "0 3 * * *"  # daily 03:00 UTC
  workflow_dispatch:      # manual trigger
  push:
    branches: [main]
    paths:
      - "catalog/**"
      - "plugins/**"
      - "content/**"
      - "trusted-sources.json"

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Only typecheck the catalog builder — plugins may have unresolved peer deps
      # (e.g. @armyofagents/plugin-sdk not yet on npm) until M.2 wires the SDK properly.
      - run: pnpm --filter @armyofagents/aoa-marketplace-builder typecheck

      # Tests: catalog builder always; plugins only if they can resolve their deps
      - run: pnpm --filter @armyofagents/aoa-marketplace-builder test
      - run: pnpm --filter @armyofagents/aoa-plugin-slack test 2>&1 || echo "::warning::aoa-plugin-slack tests skipped (SDK peer dep not on npm yet — M.2)"

      - name: Aggregate catalog
        run: pnpm aggregate
        env:
          RUN_NETWORK_TESTS: "1"

      - name: Upload catalog artifact
        uses: actions/upload-artifact@v4
        with:
          name: catalog
          path: dist/catalog.json
          retention-days: 30

      - name: Publish catalog.json to public CDN repo
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          CDN_DEPLOY_KEY: ${{ secrets.CDN_DEPLOY_KEY }}
        run: |
          # Set up SSH for the deploy key
          mkdir -p ~/.ssh
          echo "$CDN_DEPLOY_KEY" > ~/.ssh/cdn_deploy_key
          chmod 600 ~/.ssh/cdn_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/cdn_deploy_key -o IdentitiesOnly=yes"

          # Clone CDN repo, copy catalog.json, commit if changed, push
          git clone git@github.com:MeteoriteLabs/aoa-marketplace-cdn.git /tmp/cdn
          cp dist/catalog.json /tmp/cdn/catalog.json
          cd /tmp/cdn
          git config user.email "ci@armyofagents.org"
          git config user.name "AoA Marketplace CI"
          git add catalog.json
          if git diff --cached --quiet; then
            echo "No catalog changes; skipping publish"
          else
            git commit -m "chore: publish catalog @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin main
            echo "Published catalog.json to CDN"
          fi

          # Cleanup
          rm -rf ~/.ssh/cdn_deploy_key
